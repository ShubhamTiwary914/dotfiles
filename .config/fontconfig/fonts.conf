<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- Force all generic families to use JetBrainsMono Nerd Font -->
    <match target="pattern">
        <test name="family">
            <string>sans-serif</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>JetBrainsMono Nerd Font</string>
        </edit>
    </match>

    <match target="pattern">
        <test name="family">
            <string>monospace</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>JetBrainsMono Nerd Font</string>
        </edit>
    </match>

    <match target="pattern">
        <test name="family">
            <string>serif</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>JetBrainsMono Nerd Font</string>
        </edit>
    </match>
</fontconfig>

